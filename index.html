"1","level_apu":"/","alarm_condition":"加速踏板1AD采样》20000或两路加速踏板1AD采样《200； 加速踏板2AD采样》20000或两路加速踏板2AD采样《200；","duration":"1","clear_condition":"标志位=0","config":"","solution":"1.线束问题 在整车控制器上电的情况下，先测加速踏板线束电压，在正常情况下，测得的电压应为5V，如果检测电压不为5V，则测整车控制器加速踏板输出端线束电压，如果出现异常，则说明加速踏板电源线束出现问题，需要检查电源线束。如果电源线束正常的话，再测加速踏板信号线束电压，踩加速踏板观察电压是否有变化，如果无电压变化，则说明加速踏板信号线束有问题，需要检查信号线束。 2、加速踏板出现故障，更换加速踏板。","_fid":"pedal"},{"code":"1106","category":"踏板","name":"制动踏板短路或断路","level_drive":"2","level_brake":"4","level_apu":"/","alarm_condition":"制动踏板AD采样》20000或制动踏板2AD采样《200","duration":"1","clear_condition":"标志位=0","config":"选配（无EBS有此项）","solution":"1.线束问题 在整车控制器上电的情况下，先测制动踏板端电源电压，如果检测不到电压，则测整车控制器制动踏板电源端线束电压，如果出现异常，则说明制动踏板电源线束出现问题，需要检查电源线束。如果电源线束正常的话，再测制动踏板信号线束电压，将制动踏板踩到底，如果检测不到制动踏板信号线束端电压变化，则说明制动踏板信号线束有问题，需要检查信号线束； 2.制动踏板出现故障，更换制动踏板。","_fid":"pedal"},{"code":"1107","category":"踏板","name":"加速踏板、制动踏板同时有效","level_drive":"4","level_brake":"1","level_apu":"/","alarm_condition":"加速踏板、制动踏板开度同时＞0.1，且keyon信号有效","duration":"1","clear_condition":"加速踏板开度＜2","config":"","solution":"1 司机同时踩下加速踏板和制动踏板，松开其中一个踏板，故障即可消除，同时踩加速踏板与制动踏板时，制动踏板优先； 2 线束问题，检查加速踏板信号线1与制动踏板信号线1是否同时大于0.7 V。需消除此现象。","_fid":"pedal"},{"code":"1108","category":"踏板","name":"加速踏板不回位或加速踏板比例失常故障","level_drive":"4","level_brake":"1","level_apu":"/","alarm_condition":"上高压前检测到加速踏板开度》0.01； 油门踏板1采样值与油门踏板2采样值比例不为2:1","duration":"1","clear_condition":"加速踏板开度《0.01； 比例恢复2:1","config":"","solution":"1、司机松开加速踏板，故障消除； 2、线束问题，加速踏板信号线1在加速踏板松开的情况下电压大于0.7V。需消除此现象。","_fid":"pedal"},{"code":"1109","category":"踏板","name":"加速踏板误踩故障","level_drive":"4","level_brake":"1","level_apu":"/","alarm_condition":"油门变化率》800，电机转速《50且加速踏板开度大于50","duration":"0.02","clear_condition":"加速踏板开度《30","config":"","solution":"司机踩加速踏板过快，踏板回位后，再慢慢踩下去即可。","_fid":"pedal"},{"code":"1201","category":"挡位","name":"挡位挂挡失败（未踩制动踏板或踩加速踏板挂挡）","level_drive":"1","level_brake":"1","level_apu":"/","alarm_condition":"1.未踩制动踏板挂档； 2.踩加速踏板挂挡 3.档位面板故障=4（来自报文0x18FC0011）","duration":"1","clear_condition":"踩制动换挡； 松油门踩制动； 档位面板故   {id: 'accharge', label: '交流充电'},
  {id: 'autopilot', label: '自动驾驶'},
];

let currentFid = '';
let currentQuery = '';

function lvClass(v) {
  if (!v || v === '/' || v === '--' || v === '') return 'lvx';
  var n = parseInt(v);
  if (n === 0) return 'lv0'; if (n === 1) return 'lv1';
  if (n === 2) return 'lv2'; return 'lv3';
}
function badgeClass(v) {
  if (!v || v === '/' || v === '--' || v === '') return 'lv-x';
  var n = parseInt(v);
  if (n === 0) return 'lv-0'; if (n === 1) return 'lv-1';
  if (n === 2) return 'lv-2'; return 'lv-3';
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(text,q){
  if(!q)return esc(text);
  var safe=esc(text);
  var sq=esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return safe.replace(new RegExp(sq,'gi'),function(m){return'<mark>'+m+'</mark>'});
}

/* Original renderCard for single-row items (proven working) */
function renderCard(f,q){
  var id='c'+f.code;
  var badges='';
  if(f.level_drive&&f.level_drive!=='/')badges+='<span class="level-badge '+badgeClass(f.level_drive)+'">驱动'+f.level_drive+'级</span>';
  if(f.level_brake&&f.level_brake!=='/')badges+='<span class="level-badge '+badgeClass(f.level_brake)+'">制动'+f.level_brake+'级</span>';
  if(f.level_apu&&f.level_apu!=='/')badges+='<span class="level-badge '+badgeClass(f.level_apu)+'">APU'+f.level_apu+'级</span>';
  var dv=(f.level_drive&&f.level_drive!=='/')?f.level_drive:'/';
  var bv=(f.level_brake&&f.level_brake!=='/')?f.level_brake:'/';
  var av=(f.level_apu&&f.level_apu!=='/')?f.level_apu:'/';
  return '<div class="fault-card" id="'+id+'">'+
  '<div class="card-header" onclick="toggleCard(\''+id+'\')" id="hdr-'+id+'">'+
    '<div class="code-badge">'+hl(f.code,q)+'</div>'+
    '<div class="card-title-block">'+
      '<div class="fault-name">'+hl(f.name,q)+'</div>'+
      '<div class="fault-category">'+hl(f.category,q)+'</div>'+
      (badges?'<div class="level-badges">'+badges+'</div>':'')+
    '</div>'+
    '<span class="expand-icon" id="ico-'+id+'">&#9662;</span>'+
  '</div>'+
  '<div class="card-body" id="body-'+id+'">'+
    '<div class="body-inner">'+
      '<div class="level-grid">'+
        '<div class="level-cell"><div class="lc-label">驱动等级</div><div class="lc-val '+lvClass(f.level_drive)+'">'+esc(dv)+'</div></div>'+
        '<div class="level-cell"><div class="lc-label">制动等级</div><div class="lc-val '+lvClass(f.level_brake)+'">'+esc(bv)+'</div></div>'+
        '<div class="level-cell"><div class="lc-label">APU 等级</div><div class="lc-val '+lvClass(f.level_apu)+'">'+esc(av)+'</div></div>'+
      '</div>'+
      (f.alarm_condition?'<div class="detail-section"><div class="detail-label">报警条件</div><div class="detail-value">'+esc(f.alarm_condition)+'</div></div>':'')+
      (f.duration?'<div class="detail-section"><div class="detail-label">持续时间</div><div class="detail-value">'+esc(f.duration)+' 秒</div></div>':'')+
      (f.clear_condition?'<div class="detail-section"><div class="detail-label">故障解除条件</div><div class="detail-value">'+esc(f.clear_condition)+'</div></div>':'')+
      (f.config?'<div class="detail-section"><div class="detail-label">配置信息</div><div class="detail-value">'+esc(f.config)+'</div></div>':'')+
      (f.solution?'<div class="detail-section"><div class="detail-label">现场处理方法</div><div class="detail-value solution-box">'+esc(f.solution)+'</div></div>':'')+
    '</div></div></div>';
}

/* Grouped card for multi-row / upgrade cases */
function renderGroupedCard(rows,q){
  var drives={};
  var brakes={};
  for(var ri=0;ri<rows.length;ri++){
    var rd=rows[ri].level_drive;
    var rb=rows[ri].level_brake;
    if(rd&&rd!=='/')drives[rd]=1;
    if(rb&&rb!=='/')brakes[rb]=1;
  }
  var dKeys=Object.keys(drives);
  var bKeys=Object.keys(brakes);
  var isUpgrade=(dKeys.length>1)||(bKeys.length>1);

  var f=rows[0];
  var id='c'+f.code;
  var srows=rows.slice().sort(function(a,b){
    return(parseFloat(a.duration)||999)-(parseFloat(b.duration)||999);
  });

  var upTag='';
  if(isUpgrade&&srows.length>1){
    upTag='<span class="upgrade-badge">含'+srows.length+'级升级 &#9651;</span>';
  }else if(srows.length>1){
    upTag='<span class="multi-badge">含'+srows.length+'行记录</span>';
  }

  var hBadges='';
  if(isUpgrade&&dKeys.length>1){
    hBadges+='<span class="level-badge '+badgeClass(dKeys[dKeys.length-1])+'">驱动'+dKeys[0]+'-'+dKeys[dKeys.length-1]+'级</span>';
  }else if(f.level_drive&&f.level_drive!=='/'){
    hBadges+='<span class="level-badge '+badgeClass(f.level_drive)+'">驱动'+f.level_drive+'级</span>';
  }
  if(isUpgrade&&bKeys.length>1){
    hBadges+='<span class="level-badge '+badgeClass(bKeys[bKeys.length-1])+'">制动'+bKeys[0]+'-'+bKeys[bKeys.length-1]+'级</span>';
  }else if(f.level_brake&&f.level_brake!=='/'){
    hBadges+='<span class="level-badge '+badgeClass(f.level_brake)+'">制动'+f.level_brake+'级</span>';
  }

  var rowsHtml='';
  for(var i=0;i<srows.length;i++){
    var sr=srows[i];
    var rb2='';
    if(sr.level_drive&&sr.level_drive!=='/')
      rb2+='<span class="level-badge '+badgeClass(sr.level_drive)+'">驱动'+sr.level_drive+'级</span>';
    if(sr.level_brake&&sr.level_brake!=='/')
      rb2+='<span class="level-badge '+badgeClass(sr.level_brake)+'">制动'+sr.level_brake+'级</span>';
    if(sr.level_apu&&sr.level_apu!=='/')
      rb2+='<span class="level-badge '+badgeClass(sr.level_apu)+'">APU'+sr.level_apu+'级</span>';

    var sdv=(sr.level_drive&&sr.level_drive!=='/')?sr.level_drive:'/';
    var sbv=(sr.level_brake&&sr.level_brake!=='/')?sr.level_brake:'/';
    var sav=(sr.level_apu&&sr.level_apu!=='/')?sr.level_apu:'/';

    var rowLabel='';
    if(srows.length>1){
      rowLabel=(i===0)?'<div class="row-label">&#9889 初始触发</div>':'<div class="row-label">&#11014; 故障升级 #'+i+'</div>';
    }

    rowsHtml+='<div class="sub-row '+(srows.length>1?'multi-row':'')+'">'+
      rowLabel+
      (rb2?'<div class="level-badges">'+rb2+'</div>':'')+
      '<div class="level-grid">'+
        '<div class="level-cell"><div class="lc-label">驱动</div><div class="lc-val '+lvClass(sr.level_drive)+'">'+esc(sdv)+'</div></div>'+
        '<div class="level-cell"><div class="lc-label">制动</div><div class="lc-val '+lvClass(sr.level_brake)+'">'+esc(sbv)+'</div></div>'+
        '<div class="level-cell"><div class="lc-label">APU</div><div class="lc-val '+lvClass(sr.level_apu)+'">'+esc(sav)+'</div></div>'+
        '<div class="level-cell"><div class="lc-label">持续时间</div><div class="lc-val">'+esc(sr.duration||'-')+'秒</div></div>'+
      '</div>'+
      (sr.alarm_condition?'<div class="detail-section"><div class="detail-label">报警条件</div><div class="detail-value">'+esc(sr.alarm_condition)+'</div></div>':'')+
      (sr.clear_condition?'<div class="detail-section"><div class="detail-label">解除条件</div><div class="detail-value">'+esc(sr.clear_condition)+'</div></div>':'')+
      (sr.config?'<div class="detail-section"><div class="detail-label">配置信息</div><div class="detail-value">'+esc(sr.config)+'</div></div>':'')+
      (sr.solution?'<div class="detail-section"><div class="detail-label">处理方法</div><div class="detail-value solution-box">'+esc(sr.solution)+'</div></div>':'')+
    '</div>';
  }
  return '<div class="fault-card" id="'+id+'">'+
  '<div class="card-header" onclick="toggleCard(\''+id+'\')" id="hdr-'+id+'">'+
    '<div class="code-badge">'+hl(f.code,q)+'</div>'+
    '<div class="card-title-block">'+
      '<div class="fault-name">'+hl(f.name,q)+'</div>'+
      '<div class="fault-category">'+hl(f.category,q)+'</div>'+
      (upTag?'<div class="upgrade-info">'+upTag+'</div>':'')+
      (hBadges?'<div class="level-badges">'+hBadges+'</div>':'')+
    '</div>'+
    '<span class="expand-icon" id="ico-'+id+'">&#9662;</span>'+
  '</div>'+
  '<div class="card-body" id="body-'+id+'">'+
    '<div class="body-inner">'+rowsHtml+'</div>'+
  '</div></div>';
}

function toggleCard(id){
  var body=document.getElementById('body-'+id);
  var ico=document.getElementById('ico-'+id);
  var isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  ico.classList.toggle('open',!isOpen);
}

function doSearch(){
  var q=currentQuery.trim();
  var results=FAULTS;

  /* V10改：搜索时忽略分类筛选，实现全局搜索 */
  if(q){
    var ql=q.toLowerCase();
    results=results.filter(function(f){
      return f.code.indexOf(q)!==-1||
             (f.name||'').toLowerCase().indexOf(ql)!==-1||
             (f.category||'').toLowerCase().indexOf(ql)!==-1||
             (f.alarm_condition||'').toLowerCase().indexOf(ql)!==-1||
             (f.solution||'').toLowerCase().indexOf(ql)!==-1;
    });
  } else {
    /* 没有搜索词时，才按分类筛选 */
    if(currentFid){
      results=results.filter(function(f){return f._fid===currentFid});
    }
  }

  var list=document.getElementById('list');
  var stats=document.getElementById('stats');

  if(results.length===0){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">&#128269;</div><p>没有找到与「'+esc(q)+'」相关的故障代码<br><small style="color:#ccc;font-size:12px">试试用中文关键词或数字代码搜索</small></p></div>';
    stats.innerHTML='';
    return;
  }

  /* Group by code */
  var groups={};
  for(var gi=0;gi<results.length;gi++){
    var fc=results[gi].code;
    if(!groups[fc])groups[fc]=[];
    groups[fc].push(results[gi]);
  }
  var gArr=[];
  for(var ck in groups){if(groups.hasOwnProperty(ck))gArr.push({code:ck,rows:groups[ck]});}
  gArr.sort(function(a,b){return parseInt(a.code)-parseInt(b.code)});

  var ucount=gArr.length;
  var tcount=results.length;
  var tText='';
  if(q){
    tText='找到 '+ucount+' 个相关代码 ('+tcount+' 条记录)';
    if(currentFid){
      // 显示当前分类筛选状态
      var filterLabel = '';
      for(var i=0;i<FILTERS_V10.length;i++){
        if(FILTERS_V10[i].id===currentFid){
          filterLabel=FILTERS_V10[i].label;
          break;
        }
      }
      if(filterLabel){
        tText+=' <span style=\"color:#999;font-size:12px\">(当前筛选: '+filterLabel+')</span>';
      }
    }
  }else{
    tText=(currentFid)?
      (ucount+' 个代码 / '+tcount+' 条记录'):
      ('共 '+ucount+' 个故障代码 ('+tcount+' 条记录)');
  }
  stats.innerHTML=tText;

  var html='';
  for(var hi=0;hi<gArr.length;hi++){
    var g=gArr[hi];
    if(g.rows.length<=1){
      html+=renderCard(g.rows[0],q);
    }else{
      html+=renderGroupedCard(g.rows,q);
    }
  }
  list.innerHTML=html;

  /* Auto-expand exact match */
  if(q){
    for(var ei=0;ei<gArr.length;ei++){
      if(gArr[ei].code===q){
        var eid='c'+q;
        setTimeout(function(){toggleCard(eid);var el=document.getElementById(eid);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},80);
        break;
      }
    }
  }
}

/* V10: Filter by fixed fid */
function setFilterByFid(btn,fid){
  document.querySelectorAll('.filter-chip').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  currentFid=fid;
  doSearch();
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  currentQuery='';
  document.getElementById('clearBtn').classList.remove('show');
  doSearch();
}

document.getElementById('searchInput').addEventListener('input',function(){
  currentQuery=this.value;
  document.getElementById('clearBtn').classList.toggle('show',!!this.value);
  doSearch();
});

doSearch();

</script>
